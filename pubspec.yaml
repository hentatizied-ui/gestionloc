name: gestion_locative
description: Application de gestion locative avec Google Sheets
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  cupertino_icons: ^1.0.6
  fl_chart: ^0.68.0
  intl: ^0.19.0
  flutter_slidable: ^3.1.0
  uuid: ^4.4.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  url_launcher: ^6.2.5
  pdf: ^3.11.1
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/signature_saafi.jpg
    - assets/images/signature_hentati.jpg