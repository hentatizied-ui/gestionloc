name: gestion_locative
description: Application de gestion locative avec Google Drive
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Google Sign-In & Drive
  google_sign_in: ^6.2.1
  googleapis: ^12.0.0
  googleapis_auth: ^1.6.0
  http: ^1.2.1

  # UI
  cupertino_icons: ^1.0.6
  fl_chart: ^0.68.0
  intl: ^0.19.0
  flutter_slidable: ^3.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Utilitaires
  shared_preferences: ^2.2.3
  uuid: ^4.4.0
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
