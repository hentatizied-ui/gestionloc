workflows:
  ios-no-sign:
    name: iOS Build (no signing)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Pod install
        script: |
          cd ios
          pod repo update
          pod install

      - name: Build iOS no-codesign
        script: |
          flutter build ios --release --no-codesign

      - name: Package Runner.app.zip
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r Runner.app.zip Payload/

    artifacts:
      - build/ios/iphoneos/Runner.app.zip